name: Docker Build and Push

on:
  workflow_call:
    inputs:
      # Repository name
      image_name:
        required: true
        type: string
      # Context
      context:
        required: false
        type: string
        default: .
      # Dockerfile
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      # Platforms to build for
      platforms:
        required: false
        type: string
        default: linux/amd64,linux/arm64,linux/arm/v7
      # Image tag
      image_tag:
        required: false
        type: string
        default: latest
      # Whether to push the image to DockerHub
      should_push:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_PASSWORD:
        required: false

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      -
        name: Login to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        if: ${{ env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      -
        name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.should_push && env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
          platforms: ${{ inputs.platforms }}
          # If there's a username, set to username/image_name:tag, otherwise just image_name:tag
          tags: ${{ env.DOCKER_USERNAME != null && format('{0}/', env.DOCKER_USERNAME) || '' }}${{ inputs.image_name }}:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
