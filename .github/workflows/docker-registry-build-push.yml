name: Docker Build and Push to Registry

on:
  workflow_call:
    inputs:
      # Repository name
      image_name:
        required: true
        type: string
      # Registry URL
      registry:
        required: false
        type: string
        default: docker.io
      # Context
      context:
        required: false
        type: string
        default: .
      # Dockerfile
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      # Platforms to build for (comma-separated)
      platforms:
        required: false
        type: string
        default: linux/amd64
      # Image tag
      image_tag:
        required: false
        type: string
        default: latest
      # Whether to push the image to the registry
      should_push:
        required: false
        type: boolean
        default: false
      # Use native runners per platform instead of QEMU emulation.
      # Supports linux/amd64 (ubuntu-latest) and linux/arm64 (ubuntu-24.04-arm).
      use_native_runners:
        required: false
        type: boolean
        default: true
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: false
      DOCKER_REGISTRY_PASSWORD:
        required: false

jobs:

  # Generate the build matrix from the platforms input so runner, scope, and
  # artifact name can all be derived per-platform before build jobs start.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      -
        name: Generate build matrix
        id: generate
        run: |
          entries=()
          IFS=',' read -ra platforms <<< "${PLATFORMS}"
          for platform in "${platforms[@]}"; do
            platform="${platform// /}"
            safe="${platform//\//-}"
            if [[ "${USE_NATIVE_RUNNERS}" == "true" && "$platform" == *"arm"* ]]; then
              runner="ubuntu-24.04-arm"
            else
              runner="ubuntu-latest"
            fi
            entries+=("{\"platform\":\"$platform\",\"runner\":\"$runner\",\"scope\":\"$safe\",\"artifact\":\"digests-$safe\"}")
          done
          matrix="[$(IFS=,; echo "${entries[*]}")]"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
        env:
          PLATFORMS: ${{ inputs.platforms }}
          USE_NATIVE_RUNNERS: ${{ inputs.use_native_runners }}

  # Build each platform on native runners (except on private repos, hence the switch)
  build:
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    env:
      REGISTRY: ${{ inputs.registry }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive
          persist-credentials: false
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      -
        name: Login to Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        if: ${{ env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      -
        name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ inputs.registry }}/${{ env.DOCKER_USERNAME }}/${{ inputs.image_name }},push-by-digest=true,name-canonical=true,push=${{ inputs.should_push && env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
      -
        name: Export digest
        if: ${{ inputs.should_push && env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
      -
        name: Upload digest
        if: ${{ inputs.should_push && env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    # always() lets this run even if one platform job was skipped (single-platform builds)
    if: ${{ always() && !failure() && !cancelled() && inputs.should_push }}
    needs: [setup, build]
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ inputs.registry }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
    steps:
      -
        name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      -
        name: Login to Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      -
        name: Docker Meta/Sanitize
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.DOCKER_USERNAME != null && format('{0}/{1}/', env.REGISTRY, env.DOCKER_USERNAME) || '' }}${{ inputs.image_name }}
          tags: ${{ inputs.image_tag }}
      -
        name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${REGISTRY}/${DOCKER_USERNAME}/${IMAGE_NAME}@sha256:%s ' *)
        env:
          REGISTRY: ${{ inputs.registry }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          IMAGE_NAME: ${{ inputs.image_name }}
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

