name: Docker Build and Push to Registry

on:
  workflow_call:
    inputs:
      # Repository name
      image_name:
        required: true
        type: string
      # Registry URL
      registry:
        required: false
        type: string
        default: docker.io
      # Context
      context:
        required: false
        type: string
        default: .
      # Dockerfile
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      # Platforms to build for
      platforms:
        required: false
        type: string
        default: linux/amd64
      # Image tag
      image_tag:
        required: false
        type: string
        default: latest
      # Whether to push the image to the registry
      should_push:
        required: false
        type: boolean
        default: false
      # Use native runners per platform instead of QEMU emulation.
      # Supports linux/amd64 (ubuntu-latest) and linux/arm64 (ubuntu-24.04-arm).
      use_native_runners:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: false
      DOCKER_REGISTRY_PASSWORD:
        required: false

jobs:

  # Ubuntu arm runners aren't available for private repos, so keep old way
  docker:
    if: ${{ !inputs.use_native_runners }}
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ inputs.registry }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive
          persist-credentials: false
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      -
        name: Login to Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        if: ${{ env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      -
        name: Docker Meta/Sanitize
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          # If there's a username, set to registry/username/image_name, otherwise just image_name
          images: ${{ env.DOCKER_USERNAME != null && format('{0}/{1}/', env.REGISTRY, env.DOCKER_USERNAME) || '' }}${{ inputs.image_name }}
          tags: ${{ inputs.image_tag }}
      -
        name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.should_push && env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build each platform separately on native runners to get around QEMU issues
  build:
    if: ${{ inputs.use_native_runners && contains(inputs.platforms, matrix.platform) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            scope: linux-amd64
            artifact: digests-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            scope: linux-arm64
            artifact: digests-arm64
    runs-on: ${{ matrix.runner }}
    env:
      REGISTRY: ${{ inputs.registry }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Login to Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: ${{ env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      -
        name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ inputs.registry }}/${{ env.DOCKER_USERNAME }}/${{ inputs.image_name }},push-by-digest=true,name-canonical=true,push=${{ inputs.should_push && env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
      -
        name: Export digest
        if: ${{ inputs.should_push && env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
      -
        name: Upload digest
        if: ${{ inputs.should_push && env.DOCKER_USERNAME != null && env.DOCKER_PASSWORD != null }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    # always() lets this run even if one platform job was skipped (single-platform builds)
    if: ${{ always() && !failure() && !cancelled() && inputs.use_native_runners && inputs.should_push }}
    needs: [build]
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ inputs.registry }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
    steps:
      -
        name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      -
        name: Login to Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      -
        name: Docker Meta/Sanitize
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.DOCKER_USERNAME != null && format('{0}/{1}/', env.REGISTRY, env.DOCKER_USERNAME) || '' }}${{ inputs.image_name }}
          tags: ${{ inputs.image_tag }}
      -
        name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${REGISTRY}/${DOCKER_USERNAME}/${IMAGE_NAME}@sha256:%s ' *)
        env:
          REGISTRY: ${{ inputs.registry }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          IMAGE_NAME: ${{ inputs.image_name }}
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

